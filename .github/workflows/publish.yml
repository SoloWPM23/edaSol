name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:  # Untuk manual trigger

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # Diperlukan untuk OIDC authentication

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install build tools
      run: |
        python -m pip install --upgrade pip
        pip install build

    - name: Build package
      run: python -m build

    - name: Verify build
      run: |
        pip install dist/*.whl
        python -c "from edaSol import quick_summary; print('Build OK!')"

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
